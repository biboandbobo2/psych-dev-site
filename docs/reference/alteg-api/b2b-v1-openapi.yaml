  /company/{location_id}/clients/visits/search:
    post:
      tags:
        - Clients
      summary: Search by customer history
      description: >
        Displays the client’s visit history.This method returns the client’s
        appointment and product purchase history, grouped by visit. Data is
        filtered based on visit status and paid status.

        The client is identified using either the client_id or client_phone
        parameter. All other parameters are optional. 

        Results are sorted by visit date and paginated in batches of 25 items.
        If multiple visits share the same date as the last item on the page,
        they will be included on the current page to ensure complete grouping.

        To retrieve the next page, use the from and to values provided in the
        meta field of the current response.
      operationId: search_client_visits
      security:
        - BearerPartnerUser: []
      parameters:
        - $ref: '#/components/parameters/accept_header'
        - $ref: '#/components/parameters/content_type_header'
        - $ref: '#/components/parameters/company_id'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - client_id
                - client_phone
                - from
                - to
                - payment_statuses
                - attendance
              type: object
              properties:
                client_id:
                  type:
                    - number
                    - 'null'
                  description: Client ID.
                  example: 123
                client_phone:
                  type:
                    - string
                    - 'null'
                  description: Customer phone number.
                  example: 13155550184
                from:
                  type:
                    - string
                    - 'null'
                  description: Period start date.
                  format: date
                  example: '2022-01-31'
                to:
                  type:
                    - string
                    - 'null'
                  description: Period end date.
                  format: date
                  example: '2022-02-01'
                payment_statuses:
                  type: array
                  description: >
                    Visit payment status:  
                      `not_paid` - the visit is not paid, no payments were made for the visit;  
                      `paid_not_full` - the visit is partially paid;  
                      `paid_full` - the visit is paid in full, there is no overpayment;  
                      `paid_over` - there is an overpayment for the visit.  
                    If the filter by payment status is not required, then an
                    empty array `[]` must be passed.
                  items:
                    type: string
                    enum:
                      - not_paid
                      - paid_not_full
                      - paid_full
                      - paid_over
                attendance:
                  type:
                    - number
                    - 'null'
                  description: |
                    Visit status:
                      `-1`: - the client did not come;
                      `0`: - waiting for the client;
                      `1`: - the client has arrived;
                      `2`: - the client has confirmed the appointment.
                  enum:
                    - -1
                    - 0
                    - 1
                    - 2
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/response_success_true_object'
                  data:
                    $ref: '#/components/schemas/client_visits_history'
                  meta:
                    $ref: '#/components/schemas/response_meta_date_paginator_object'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422_unprocessable_entity_response'

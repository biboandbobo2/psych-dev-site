        | ------------- | ------------- | ------------- | ------------- |

        | 5 | 400 | ENTITY_VALIDATION_ERROR | The request body did not pass
        validation |

        | 10 | 400 | FIELD_VALIDATION_ERROR | Parameter not validated |

        | 15 | 403 | ACCESS_FORBIDDEN | The action is not available, the
        application does not have the required permissions. |

        | 20 | 401 | INVALID_PARTNER_TOKEN | partner_token missing or invalid |

        | 30 | 404 | RESOURCE_NOT_FOUND | The resource at the requested path
        does not exist |



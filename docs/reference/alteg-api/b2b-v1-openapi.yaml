          $ref: '#/components/schemas/loyalty_notification_message_template_request'
        on_expiration_notification_template:
          $ref: '#/components/schemas/loyalty_notification_message_template_request'
        rules:
          type: array
          description: >-
            Rules for determining the value of the bonus or discount (only one
            rule is allowed for fixed promotions)
          items:

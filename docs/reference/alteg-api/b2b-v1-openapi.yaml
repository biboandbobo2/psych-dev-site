  /company/{location_id}/loyalty/abonement_types/search:
    get:
      tags:
        - Subscriptions & Certificates
      security:
        - BearerPartnerUser: []
      summary: Get a List of Available Membership Types
      description: >-
        A list of **membership types** available at a location can be obtained
        by requesting the location ID.

        The list can be filtered by membership type name by passing the title
        parameter. Pagination is supported, specified by the `page` and
        `page_size` parameters.


        The list is an array of [membership types](#loyalty-membership-type).


        <a name="loyalty-membership-type"></a>

        **Membership type** has the following structure:


        | Field                          | Type    |
        Description                                                                                                         
        |

        |-------------------------------|---------|----------------------------------------------------------------------------------------------------------------------|

        | id                            | number  | Membership type
        identifier                                                                                          
        |

        | title                         | string  | Membership type
        name                                                                                              
        |

        | allow_freeze                  | boolean | Is it possible to freeze
        memberships? true - allowed, false - not
        allowed                                            |

        | freeze limit                  | number  | Maximum total freezing
        period
        (days)                                                                                
        |

        | salon_group_id                | number  | Identifier of the chain in
        which the membership type is
        valid                                                        |

        | period                        | number  | Membership expiration date
        (0 if not
        set)                                                                           
        |

        | period_unit_id                | number  | Membership expiration unit
        (list of possible values, if not set -
        0)                                               |

        | is_allow_empty_code           | boolean | Allow the sale of a
        membership without a code? true - allow, false - do not
        allow                                    |

        | is_united_balance             | boolean | Total or separate membership
        balance: true - total, false -
        separate                                                 |

        | united_balance_services_count | number  | Number of visits for total
        balance                                                                                  
        |


        <a name="loyalty-membership-expiration-unit"></a>

        **Measurement units of membership type validity period**


        | Meaning | Description |

        |---------|-------------|

        | 1       | Day         |

        | 2       | Week        |

        | 3       | Month       |

        | 4       | Year        |
      operationId: get_membership_type_list
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: Conetnt-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token, User user_token
          required: true
          schema:
            type: string
        - name: title
          in: query
          description: Membeship type name
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: number
        - name: page_size
          in: query
          description: The number of output lines per page. Maximum 100
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/loyalty_abonements_type_search_response_data_types
              example:
                success: true
                data:
                  - id: 12233
                    salon_group_id: 123
                    title: Subscription with the possibility of freezing for 14 days
                    period: 0
                    period_unit_id: 0
                    allow_freeze: true
                    freeze_limit: 14
                    is_allow_empty_code: false
                    is_united_balance: false
                    united_balance_services_count: 0
                  - id: 255789
                    salon_group_id: 456
                    title: Subscription for 6 months
                    period: 6
                    period_unit_id: 3
                    allow_freeze: false
                    freeze_limit: 0
                    is_allow_empty_code: false
                    is_united_balance: false
                    united_balance_services_count: 0
                meta:
                  count: 2
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'
  /chain/{chain_id}/loyalty/abonements/{membership_id}/freeze:
    post:
      tags:
        - Chain Loyalty Programs
      security:
        - BearerPartnerUser: []
      summary: Freeze membership
      description: >
        Freezes a subscription (membership) until the specified date.


        The subscription's expiration date will be extended by the freeze
        period.

        Frozen subscriptions cannot be used for appointments.


        **Requirements:**

        - Membership type must have `allow_freeze: true`

        - Freeze period must not exceed `freeze_limit` from membership type


        **Note:** Requires chain-level permissions.
      operationId: chain_loyalty_memberships_freeze
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: chain_id
          in: path
          description: Chain ID
          required: true
          schema:
            type: integer
          example: 706028
        - name: membership_id
          in: path
          description: Membership ID to freeze
          required: true
          schema:
            type: integer
          example: 123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - freeze_till
              type: object
              properties:
                freeze_till:
                  type: string
                  format: date-time
                  description: >-
                    Date until which the membership will be frozen (ISO 8601
                    format)
                  example: '2026-12-31T23:59:59-05:00'
      responses:
        '200':
          description: Subscription frozen successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 123
                      number:
                        type: string
                        example: '123456'
                      is_frozen:
                        type: boolean
                        example: true
                      freeze_period:
                        type: integer
                        description: Total freeze period in days
                        example: 14
                      freeze_till:
                        type: string
                        format: date-time
                        description: Date until which membership is frozen
                        example: '2026-12-31T23:59:59-05:00'
                  meta:
                    type: array
                    example: []
        '400':
          description: Bad Request - membership cannot be frozen
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Subscription cannot be frozen
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Subscription not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '422':
          description: Validation error (freeze limit exceeded, freeze not allowed, etc.)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    additionalProperties: false
                    properties:
                      message:
                        type: string
                        example: Freeze period exceeds limit
                      errors:
                        type: object
                        description: Validation errors by field
                        additionalProperties:
                          type: array
                          items:
                            type: string

          type: integer
          description: Expiration date of bonuses or discounts
          format: int32
        expiration_timeout_unit:
          type: string
          description: >-
            The unit of measurement for the expiration date of bonuses or
            discounts
          enum:
            - day
            - week
            - month
            - year
        expiration_notification_timeout:
          type: integer
          description: >-
            How many days before the bonus or discount expires, a notification
            must be sent to the client
          format: int32
        params_source_type:
          type: string
          description: >-
            Where to get the client's history to calculate the size of the bonus
            or discount (for accumulation promotions or conditional discounts)
          enum:
            - loyalty_card
            - active_companies
            - chain
        history_start_date:
          type: string
          description: >-
            From what date to take into account the client's history to
            calculate the size of the bonus or discount (for accumulative
            promotions or conditional discounts)
          format: date

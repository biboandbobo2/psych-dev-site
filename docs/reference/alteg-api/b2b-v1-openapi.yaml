  /company/{location_id}/services/links:
    post:
      tags:
        - Services
      security:
        - BearerPartnerUser: []
      summary: Update service links
      description: |
        Updates service configuration including:
        - Team member assignments with custom duration and pricing
        - Tech cards (technological cards) for each team member
        - Required resources for the service
        - Service name translations for different languages

        This endpoint allows bulk updating of service-team member relationships
        without affecting other service properties.
      operationId: update_service_links
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
                - team_member_settings
                - resource_ids
                - translations
              properties:
                service_id:
                  type: integer
                  description: Service ID to update
                  example: 10832939
                team_member_settings:
                  type: array
                  description: >-
                    List of team members providing this service with duration
                    and tech cards
                  items:
                    type: object
                    properties:
                      team_member_id:
                        type: integer
                        description: Team member ID
                        example: 2033728
                      tech_card_id:
                        type: integer
                        description: Tech card ID for this team member's service delivery
                        example: 291341
                      hours:
                        type: integer
                        description: Service duration hours
                        minimum: 0
                        example: 0
                      minutes:
                        type: integer
                        description: Service duration minutes
                        minimum: 0
                        maximum: 59
                        example: 45
                      price:
                        oneOf:
                          - type: object
                            description: |
                              Custom price for this team member.
                              Set to null to use default service price.
                            properties:
                              min:
                                type: number
                                format: float
                                description: Minimum price ("from" price)
                                example: 999.99
                              max:
                                oneOf:
                                  - type: number
                                    format: float
                                  - type: 'null'
                                description: >-
                                  Maximum price ("to" price), null for fixed
                                  price
                                example: null
                          - type: 'null'
                resource_ids:
                  type: array
                  description: List of resource IDs required to provide this service
                  items:
                    type: integer
                  example:
                    - 62173
                translations:
                  type: array
                  description: Service name translations for different languages
                  items:
                    type: object
                    properties:
                      language_id:
                        type: integer
                        description: Language ID
                        example: 2
                      translation:
                        type: string
                        description: Translated service name (empty string to clear)
                        example: Massage
            example:
              service_id: 10832939
              team_member_settings:
                - team_member_id: 2033728
                  tech_card_id: 291341
                  hours: 0
                  minutes: 45
                  price:
                    min: 999.99
                    max: null
                - team_member_id: 1987799
                  tech_card_id: 291341
                  hours: 1
                  minutes: 15
                  price: null
              resource_ids:
                - 62173
              translations:
                - language_id: 2
                  translation: ''
                - language_id: 2
                  translation: Massage
      responses:
        '200':
          description: Service links updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                  meta:
                    type: array
                    example: []
        '400':
          description: Bad request - invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Service or location not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                      errors:
                        type: object

                    is_enabled:
                      type: boolean
                      description: Enable online purchase?
                      example: false
                    title:
                      type: string
                      description: Title for online store
                      example: Gift Certificate
                    description:
                      type: string
                      description: Description for online store
                      example: Perfect gift for any occasion
                    price:
                      type: number
                      description: Online sale price
                      example: 1000
      responses:

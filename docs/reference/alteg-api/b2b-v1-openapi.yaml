  /records/{location_id}:
    get:
      tags:
        - Appointments
      security:
        - BearerPartnerUser: []
      summary: Get list of appointments
      description: >-
        ####  Filtering Appointments


        + staff_id: team member ID. 


        Use this to retrieve appointments for a specific team member


        + client_id: Client ID 


        Use this to retrieve appointments for a specific client


        + created_user_id: User ID 


        User who created the appointment 


        Use this to filter appointments created by a specific user


        + start_date: Session start date (inclusive) 


        Returns appointments with a session starting on or after this date


        + end_date: Session end date (inclusive) 


        Returns appointments with a session ending on or before this date


        + c_start_date: Appointment creation date from 


        Returns appointments created on or after this date


        + c_end_date: Appointment creation date until 


        Returns appointments created on or before this date


        + changed_after: Modified or created after this datetime 


        Returns appointments created or modified after the specified date and
        time


        + changed_before: Modified or created before this datetime 


        Returns appointments created or modified before the specified date and
        time
      operationId: get_appointment_list
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
        - name: page
          in: query
          description: Page number
          schema:
            type: number
          example: 1
        - name: count
          in: query
          description: Number of appointments per page
          schema:
            type: number
          example: 50
        - name: team_member_id
          in: query
          description: >-
            team member ID, if you only need appointments for a specific team
            member
          schema:
            type: number
          example: 7572
        - name: client_id
          in: query
          description: Client ID. If you need appointments for a specific client
          schema:
            type: number
          example: 572
        - name: created_user_id
          in: query
          description: >-
            The ID of the user who created the appointment. If you need
            appointments created by a specific user
          schema:
            type: number
          example: 7572
        - name: start_date
          in: query
          description: >-
            Session date starting at (filter by session date). If you need
            appointments for a session starting from a specific date
          schema:
            type: string
          example: '2026-01-21'
        - name: end_date
          in: query
          description: >-
            Session date to. If you need appointments for a session before a
            specific date
          schema:
            type: string
          example: '2026-01-21'
        - name: c_start_date
          in: query
          description: >-
            Appointment creation date starting from(filter by appointment
            creation date). If you need appointments created since a specific
            date
          schema:
            type: string
          example: '2026-01-21'
        - name: c_end_date
          in: query
          description: Appointment creation date by (filter by appointment creation date).
          schema:
            type: string
          example: '2026-01-21'
        - name: changed_after
          in: query
          description: >-
            The date the appointment was modified/created. If you need
            appointments created/modified starting from a specific date and time
          schema:
            type: string
          example: '2026-01-21T23:00:00'
        - name: changed_before
          in: query
          description: >-
            The date the appointment was modified/created. If you need
            appointments created/modified before a specific date and time
          schema:
            type: string
          example: '2026-01-21T23:00:00'
        - name: include_consumables
          in: query
          description: >-
            Flag for including a list of consumables by appointments in the
            response
          schema:
            type: number
          example: 0
        - name: include_finance_transactions
          in: query
          description: >-
            Flag to include in the response financial transactions by
            appointments
          schema:
            type: number
          example: 0
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token, User user_token
          required: true
          schema:
            type: string
        - name: with_deleted
          in: query
          description: >-
            Include deleted appointments in output (with_deleted=1 will return
            deleted appointments as well)
          schema:
            type: boolean
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/records_companyid_response_data-types'

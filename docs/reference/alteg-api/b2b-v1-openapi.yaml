    get:
      tags:
        - Deposits
      security:
        - BearerPartnerUser: []
      summary: Get client account transaction history
      description: >
        Retrieves the transaction history for a specific client account in the
        chain.


        Returns a list of all transactions (top-ups, withdrawals, etc.) made on
        the client account.


        **Note:** Requires chain-level permissions.
      operationId: get_chain_client_account_history
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: chain_id
          in: path
          description: Chain ID
          required: true
          schema:
            type: integer
          example: 706028
        - name: deposit_id
          in: path
          description: Client account ID
          required: true
          schema:
            type: integer
          example: 12345
      responses:
        '200':
          description: Transaction history retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        deposit_transaction:
                          type: object
                          description: Client account transaction details
                          properties:
                            id:
                              type: integer
                              description: Transaction ID
                              example: 1
                            salon_id:
                              type: integer
                              description: Location ID where transaction occurred
                              example: 720441
                            salon_group_id:
                              type: integer
                              description: Chain ID
                              example: 706028
                            user_id:
                              type: integer
                              description: User ID associated with the client account
                              example: 123456
                            amount:
                              type: number
                              format: double
                              description: >-
                                Transaction amount (positive for top-up,
                                negative for withdrawal)
                              example: 100.5
                            date_create:
                              type: string
                              format: date-time
                              description: Transaction creation date and time
                              example: '2026-01-15T14:30:00.000000Z'
                            comment:
                              type: string
                              description: Transaction comment
                              example: Top-up payment
                            deleted:
                              type: boolean
                              description: Whether transaction has been deleted
                              example: false
                        deposit_transaction_type:
                          type: object
                          description: Transaction type information
                          properties:
                            id:
                              type: integer
                              description: Transaction type ID
                              example: 1
                            comment:
                              type: string
                              description: Transaction type name
                              example: Top-up
                  meta:
                    type: array
                    example: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':

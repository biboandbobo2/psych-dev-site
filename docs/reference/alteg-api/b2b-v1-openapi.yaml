  /goods/category_node/{location_id}/{category_id}:
    get:
      tags:
        - Products
      security:
        - BearerPartnerUser: []
      summary: Example of a request to get the composition of a category
      description: >-
        ##№ Composition of the product category


        Information on a product category and its descendants can be obtained by
        making a request specifying the location ID and product category.

        Pagination is supported, specified by the `page` and `count` parameters.


        **Composition of a product category** has the following structure:


        | Field           |
        Type                                                                 |
        Description                                                                                              
        |

        |-----------------|----------------------------------------------------------------------|-----------------------------------------------------------------------------------------------------------|

        | parent_id       |
        number                                                               |
        Parent element ID (0 for root
        elements)                                                                  
        |

        | item_id         |
        number                                                               |
        Item ID (always
        0)                                                                                       
        |

        | category_id     |
        number                                                               |
        Product category
        ID                                                                                      
        |

        | title           |
        string                                                               |
        Product category
        name                                                                                    
        |

        | is_chain        |
        boolean                                                              |
        Is the element chain-bound? true - the element is connected to the
        chain, false - not connected          |

        | is_category     |
        boolean                                                              |
        Is the element a category? always
        true                                                                   
        |

        | is_item         |
        boolean                                                              |
        Is the item a product? always
        false                                                                      
        |

        | children        | array of objects ([Product tree
        element](#good-category-tree-node)) | Child elements of a product
        category                                                                     
        |

        | children_count  |
        number                                                               |
        Total number of child products and categories (no
        recursion)                                              |
      operationId: get_product_category_composition
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
        - name: category_id
          in: path
          description: Product Category ID
          required: true
          schema:
            type: number
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: page
          in: query
          description: Page number
          schema:
            type: number
        - name: count
          in: query
          description: The number of products displayed on the page. Maximum 1000
          schema:
            type: number
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token, User user_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/goods_category_node_response200_data_types
              example:
                success: true
                data:
                  parent_id: 0
                  item_id: 0
                  category_id: 123
                  title: Root category 1
                  is_chain: false
                  is_category: true
                  is_item: false
                  children:
                    - parent_id: 123
                      item_id: 0
                      category_id: 456
                      title: Child category
                      is_chain: false
                      is_category: true
                      is_item: false
                    - parent_id: 123
                      item_id: 789
                      category_id: 0
                      title: Child product
                      is_chain: false
                      is_category: false
                      is_item: true
                  children_count: 2
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':

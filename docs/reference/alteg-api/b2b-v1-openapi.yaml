  /company/{location_id}/staff/schedule:
    get:
      tags:
        - Schedule & Resources
      security:
        - BearerPartnerUser: []
      summary: Get team member schedules
      description: |
        Retrieves work schedules for team members as working intervals.

        Optionally includes:
        - Busy intervals (appointments and events)
        - Off-day type identifiers

        **Query Parameters:**
        - `start_date` / `end_date` - Date range for schedule search
        - `staff_ids[]` - Filter by specific team members
        - `include[]` - Include additional data (busy_intervals, off_day_type)
      operationId: get_team_member_schedule_list
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
        - name: start_date
          in: query
          description: Start date for schedule search (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: '2026-01-31'
        - name: end_date
          in: query
          description: End date for schedule search (YYYY-MM-DD)
          schema:
            type: string
            format: date
          example: '2026-03-31'
        - name: staff_ids
          in: query
          description: |
            Team member IDs to filter by.
            Example: `staff_ids[]=123&staff_ids[]=234`
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: include
          in: query
          description: |
            Additional data to include in response.
            Example: `include[]=busy_intervals&include[]=off_day_type`
          schema:
            type: array
            items:
              type: string
              enum:
                - busy_intervals
                - off_day_type
          style: form
          explode: true
      responses:
        '200':
          description: Schedules retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        staff_id:
                          type: integer
                          description: Team member ID
                          example: 12345
                        date:
                          type: string
                          format: date
                          description: Schedule date (YYYY-MM-DD)
                          example: '2026-01-31'
                        slots:
                          type: array
                          description: Working time intervals
                          items:
                            type: object
                            properties:
                              from:
                                type: string
                                description: Interval start time (HH:mm)
                                example: '10:00'
                              to:
                                type: string
                                description: Interval end time (HH:mm)
                                example: '19:00'
                        busy_intervals:
                          type: array
                          description: |
                            Time intervals occupied by appointments or events.
                            Only included when `include[]=busy_intervals`.
                          items:
                            type: object
                            properties:
                              entity_type:
                                type: string
                                description: Entity type occupying the interval
                                enum:
                                  - record
                                  - activity
                                example: record
                              entity_id:
                                type: integer
                                description: Entity ID (appointment or event ID)
                                example: 456789
                              from:
                                type: string
                                description: Interval start time (HH:mm:ss)
                                example: '11:00:00'
                              to:
                                type: string
                                description: Interval end time (HH:mm:ss)
                                example: '12:00:00'
                        off_day_type:
                          oneOf:
                            - type: integer
                            - type: 'null'
                          description: |
                            Off-day type ID (if this is a non-working day).
                            Only included when `include[]=off_day_type`.
                          example: 3
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer
                        description: Total number of schedule entries
                        example: 15
              example:
                success: true
                data:
                  - team_member_id: 12345
                    date: '2026-01-31'
                    slots:
                      - from: '10:00'
                        to: '12:00'
                      - from: '13:00'
                        to: '19:00'
                    busy_intervals:
                      - entity_type: record
                        entity_id: 456789
                        from: '11:00:00'
                        to: '12:00:00'
                      - entity_type: activity
                        entity_id: 123456
                        from: '15:00:00'
                        to: '16:00:00'
                    off_day_type: null
                meta:
                  count: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
    put:
      tags:
        - Schedule & Resources
      security:
        - BearerPartnerUser: []
      summary: Set team member schedules
      description: >
        Sets work schedules for team members by date.


        Supports both setting new schedules and deleting existing ones in a
        single request.


        Returns the resulting schedules for affected team members within the
        date range

        from minimum to maximum modified date.
      operationId: set_team_member_schedule
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                schedules_to_set:
                  type: array
                  description: Schedules to create or update
                  items:
                    type: object
                    properties:
                      team_member_id:
                        type: integer
                        description: Team member ID
                        example: 12345
                      dates:
                        type: array
                        description: Dates to set schedule for (YYYY-MM-DD)
                        items:
                          type: string
                          format: date
                        example:
                          - '2026-01-31'
                          - '2026-02-01'
                      slots:
                        type: array
                        description: Working time intervals
                        items:
                          type: object
                          properties:
                            from:
                              type: string
                              description: Interval start time (HH:mm)
                              example: '10:00'
                            to:
                              type: string
                              description: Interval end time (HH:mm)
                              example: '19:00'
                schedules_to_delete:
                  type: array
                  description: Schedules to delete (make non-working days)
                  items:
                    type: object
                    properties:
                      team_member_id:
                        type: integer
                        description: Team member ID
                        example: 12345
                      dates:
                        type: array
                        description: Dates to delete schedule for (YYYY-MM-DD)
                        items:
                          type: string
                          format: date
                        example:
                          - '2026-02-02'
                          - '2026-02-03'
            example:
              schedules_to_set:
                - team_member_id: 12345
                  dates:
                    - '2026-01-31'
                    - '2026-02-01'
                  slots:
                    - from: '10:00'
                      to: '14:00'
                    - from: '15:00'
                      to: '19:00'
              schedules_to_delete:
                - team_member_id: 12345
                  dates:
                    - '2026-02-02'
      responses:
        '200':
          description: Schedules updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    description: Resulting schedules for modified team members
                    items:
                      type: object
                      properties:
                        team_member_id:
                          type: integer
                          example: 12345
                        date:
                          type: string
                          format: date
                          example: '2026-01-31'
                        slots:
                          type: array
                          items:
                            type: object
                            properties:
                              from:
                                type: string
                                example: '10:00'
                              to:
                                type: string
                                example: '19:00'
                  meta:
                    type: object
                    properties:
                      count:
                        type: integer
                        example: 2
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:

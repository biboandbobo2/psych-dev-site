    timetable_event_schedule_event:
      title: Object of model "Event of appointment/event in a Schedule"
      description: Data of the existing event of appointment or event in a schedule.
      type: object
      properties:
        id:
          type: number
          description: ID of an event of appointment/event in a schedule.
        created_at:
          type: string
          description: Datetime of an event of appointment/event in a schedule created.
          format: date-time
        updated_at:
          type: string
          description: >-
            Datetime of an event of appointment/event in a schedule last
            updated.
          format: date-time
        deleted_at:
          type:
            - string
            - 'null'
          description: Datetime of an event of appointment/event in a schedule deleted.
          format: date-time
        event_status:
          type: string
          description: >
            Event of appointment/event status:  

            `stable` - entity is stable;  

            `event_created` - event is created, corresponding appointment/event
            is not created yet;  

            `event_changed` - event is changed, corresponding appointment/event
            is not changed yet;  

            `event_changed_force` - event is changed with force override of
            manual changes, corresponding appointment/event is not changed
            yet;  

            `event_deleted` - event is deleted, corresponding appointment/event
            is not deleted yet;  

            `entity_deleted` - appointment/event corresponding to an event is
            deleted (due to event deletion or due to manual deletion);  

            `entity_failed` - appointment/event creation failure.
          enum:
            - stable
            - event_created
            - event_changed
            - event_changed_force
            - event_deleted
            - entity_deleted
            - entity_failed
        event_datetime:
          type: string
          description: Datetime of a scheduled appointment/event beginning.
          format: date-time
        event_entity_type:
          type: string
          description: >-
            Type of an scheduled entity (appointment or event). Note: enum
            values "record" and "activity" are legacy terms for appointment and
            event.
          enum:
            - record
            - activity
        event_entity_id:
          type:
            - number
            - 'null'
          description: ID of an scheduled entity (appointment or event).
        is_entity_master_changed:
          type: boolean
          description: >-
            Flag for manual change of a team member for a scheduled
            appointment/event.
        is_entity_datetime_changed:
          type: boolean
          description: >-
            Flag for manual change of a datetime for a scheduled
            appointment/event.
        is_entity_duration_changed:
          type: boolean
          description: >-
            Flag for manual change of a duration for a scheduled
            appointment/event.
        is_entity_labels_changed:
          type: boolean
          description: >-
            Flag for manual change of a tags linked to a scheduled
            appointment/event.
        is_entity_resource_instances_changed:
          type: boolean
          description: >-
            Flag for manual change of a resource instances linked to a scheduled
            appointment/event.
        entity_master:
          type: object
          description: Team member for a scheduled appointment/event.
          allOf:
            - $ref: '#/components/schemas/master_with_position'
        entity_datetime:
          type: string
          description: Actual datetime of a scheduled appointment/event beginning.
        entity_duration:
          type: string
          description: Actual duration of a scheduled appointment/event.
        entity_labels:
          type: array
          description: Actual tags linked to a scheduled appointment/event.
          items:
            $ref: '#/components/schemas/tag'
        entity_resource_instances:

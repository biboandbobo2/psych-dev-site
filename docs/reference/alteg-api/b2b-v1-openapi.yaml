    post:
      tags:
        - Chain Loyalty Programs
      security:
        - BearerPartnerUser: []
      summary: Create membership type
      description: >
        Creates a new membership type at the chain level. Membership types
        define reusable packages

        (e.g., "10 visits", "Monthly unlimited") that can be sold across
        multiple locations in the chain.


        **Important API Differences:**

        - `services` and `service_categories` must be **objects** (key-value
        pairs), not arrays

        - Example: `{"service_id": count}` not `[service_id]`

        - Some legacy documentation shows arrays, but the real API requires
        objects


        **Note:** Requires chain-level permissions.
      operationId: chain_loyalty_membership_types_create
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: chain_id
          in: path
          description: Chain ID
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - salon_group_id
                - cost
                - service_categories
                - is_united_balance
                - united_balance_services_count
              type: object
              properties:
                title:
                  type: string
                  description: Membership type name
                  example: Fitness 10-pack
                salon_group_id:
                  type: integer
                  description: Chain ID (API uses salon_group_id parameter name)
                  example: 1
                cost:
                  type: number
                  format: float
                  description: Subscription price
                  example: 500
                location_ids:
                  type: array
                  description: List of location IDs where this membership type is available
                  items:
                    type: integer
                  example:
                    - 123
                    - 456
                period:
                  type: integer
                  description: Validity period duration
                  example: 30
                period_unit_id:
                  type: integer
                  description: 'Period unit type: 1 = day, 2 = week, 3 = month, 4 = year'
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                  example: 3
                allow_freeze:
                  type: boolean
                  description: Whether membership can be frozen
                  default: false
                  example: true
                freeze_limit:
                  type: integer
                  description: Maximum total freeze period
                  example: 14
                freeze_limit_unit_id:
                  type: integer
                  description: 'Freeze period unit: 1 = day, 2 = week, 3 = month, 4 = year'
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                  example: 1
                service_price_correction:
                  type: boolean
                  description: Whether service price can be adjusted when using membership
                  default: false
                  example: true
                expiration_type_id:
                  type: integer
                  description: >-
                    Activation type: 1 = on sale, 2 = on first use, 3 = from
                    specific date
                  enum:
                    - 1
                    - 2
                    - 3
                  example: 1
                is_allow_empty_code:
                  type: boolean
                  description: |
                    Personal vs shared subscription.
                    - true = personal (only purchaser can use)
                    - false = shared (multiple people can use with code)
                  default: true
                  example: true
                is_united_balance:
                  type: boolean
                  description: >-
                    Balance type: true = unified balance, false = separate
                    balance
                  example: false
                united_balance_services_count:
                  type: integer
                  description: Number of visits for unified balance
                  example: 10
                balance_edit_type_id:
                  type: integer
                  description: >-
                    Balance adjustment permission: 0 = prohibited, 1 = only at
                    sale location, 2 = at all locations
                  enum:
                    - 0
                    - 1
                    - 2
                  example: 2
                is_online_sale_enabled:
                  type: boolean
                  description: |
                    Whether online sale is enabled.
                    If true, online_sale_price becomes required.
                  default: false
                  example: false
                online_sale_title:
                  type: string
                  description: Subscription title for online sale
                  example: Fitness Pack - 10 sessions
                online_sale_description:
                  type: string
                  description: Subscription description for online sale
                  example: Perfect for beginners. Valid for 3 months.
                online_sale_price:
                  type: number
                  format: float
                  description: >-
                    Price for online sale (required if is_online_sale_enabled =
                    true)
                  example: 450
                online_image:
                  type: string
                  description: Image URL for online sale
                  example: https://example.com/images/fitness-pack.jpg
                autoactivation_period:
                  type: integer
                  description: Maximum autoactivation period
                  example: 3
                autoactivation_time_in_days:
                  type: integer
                  description: Time units for autoactivation
                  example: 10
                autoactivation_time_unit_id:
                  type: integer
                  description: >-
                    Autoactivation time unit: 1 = days, 2 = weeks, 3 = months, 4
                    = years
                  enum:
                    - 1
                    - 2
                    - 3
                    - 4
                  example: 1
                is_archived:
                  type: boolean
                  description: Whether membership type is archived
                  default: false
                  example: false
                category:
                  type: string
                  description: Subscription category type (always "standard")
                  default: standard
                  example: standard
                salon_ids:
                  type: array
                  description: List of location IDs where this membership type is available
                  items:
                    type: integer
                  example:
                    - 720441
                    - 703092
                services:
                  type: object
                  description: >
                    Object with service IDs as keys and usage count as values.

                    For separate balance: count = number of visits per service.

                    For unified balance: use empty object {}.


                    **Important:** This is an object (key-value pairs), NOT an
                    array.
                  additionalProperties:
                    type: integer
                  example:
                    '13160808': 5
                    '13160809': 3
                service_categories:
                  type: object
                  description: >
                    Object with service category IDs as keys and usage count as
                    values.

                    For separate balance: count = number of visits per category.

                    For unified balance: count value is ignored (set to any
                    number or 0).


                    **Important:** This is an object (key-value pairs), NOT an
                    array.
                  additionalProperties:
                    type: integer
                  example:
                    '13160806': 10
                delete_online_image:
                  type: boolean
                  description: Whether to delete existing online sale image
                  default: false
                  example: false
                availability:
                  type: array
                  description: >
                    Time-based availability rules. Empty array = available
                    anytime.
                  items:
                    type: object
                    properties:
                      week_days:
                        type: array
                        description: 'Days of week when rule applies: 1 = Monday, 7 = Sunday'
                        items:
                          type: integer
                          minimum: 1
                          maximum: 7
                        example:
                          - 1
                          - 2
                          - 3
                      intervals:
                        type: array
                        description: Time intervals when membership is valid
                        items:
                          type: object
                          properties:
                            from:
                              type: integer
                              description: Interval start in seconds from midnight
                              example: 28800
                            to:
                              type: integer
                              description: Interval end in seconds from midnight
                              example: 64800
      responses:
        '200':
          description: Membership type created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/chain_loyalty_membership_type'
                  meta:
                    type: array
                    example: []
        '201':
          description: Membership type created successfully (alternate code)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/chain_loyalty_membership_type'
                  meta:
                    type: array
                    example: []
        '400':
          description: Bad Request - validation errors
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Chain not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                      errors:
                        type: object

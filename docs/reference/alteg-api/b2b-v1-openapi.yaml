        number                                                                                  
        |

        | type_id          | int     | Loyalty card type
        identifier                                                                 
        |

        | salon_group_id   | int     | ID of the chain where the card was
        created                                                    |

        | type             | object  | Object that contains the "id" and "title"
        fields: card type identifier and name             |

        | salon_group      | object  | Object that contains the "id" and "title"
        fields: identifier of the chain where the card type was created and the
        name of this chain |

        | programs         | array   | Array with information about promotions
        linked to a loyalty card                              |

        | rules            | array   | Array with information about the rules
        configured in the action                               |


        The programs array consists of objects with the following fields:


        | Attribute         | Type    |
        Description                                   |

        |-------------------|---------|-----------------------------------------------|

        | id                | int     | Promotion
        ID                                  |

        | title             | string  | Action
        name                                   |

        | loyalty_type_id   | int     | Promotion type
        ID                             |

        | item_type_id      | int     | Is cashback accrued from
        products             |

        | value_unit_id     | int     | Bonus field — Discount % or Fixed
        amount      |

        | group_id          | int     | ID of the chain where the action was
        created  |

        | loyalty_type      | object  | Object with information about the
        action      |


        The rules array consists of objects with the following fields:


        | Attribute           | Type    |
        Description                                                  |

        |---------------------|---------|--------------------------------------------------------------|

        | id                  | int     | Rule
        ID                                                      |

        | loyalty_program_id  | int     | Identifier of the promotion to which
        the rule is attached    |

        | loyalty_type_id     | int     | Promotion type
        ID                                            |

        | value               | decimal | Value from which the rule will
        work                          |
      operationId: get_loyalty_card_list_by_phone

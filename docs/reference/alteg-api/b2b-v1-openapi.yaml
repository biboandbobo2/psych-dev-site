    post:
      tags:
        - Chain Loyalty Programs
      security:
        - BearerPartnerUser: []
      summary: Create certificate type
      description: >
        Creates a new certificate type at the chain level.


        Certificate types define gift certificate templates that can be sold
        across multiple locations.


        **Item Type Restrictions:**

        - 0 = All services and products

        - 1 = Any services (no products)

        - 2 = Any products (no services)

        - 3 = Specific services only (no products)

        - 4 = Specific services + any products


        **Expiration Types:**

        - 0 = No expiration

        - 1 = Fixed date for all instances

        - 2 = Fixed period from sale date


        **Expiration Units:**

        - 1 = day

        - 2 = week

        - 3 = month

        - 4 = year


        **Balance Edit Types:**

        - 1 = Can be edited

        - 2 = Cannot be edited


        **Note:** After creation, certificate products are automatically created
        in inventory.
      operationId: chain_loyalty_certificate_types_create
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: chain_id
          in: path
          description: Chain ID
          required: true
          schema:
            type: integer
          example: 706028
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required:
                - title
                - balance
                - is_multi
                - item_type_id
                - is_allow_empty_code
                - balance_edit_type_id
                - service_ids
                - salon_ids
                - expiration
                - online_sale
              type: object
              properties:
                title:
                  type: string
                  description: Certificate type name
                  example: Gift Certificate 1000
                balance:
                  type: number
                  description: Certificate face value
                  example: 1000
                is_multi:
                  type: boolean
                  description: true = multiple use, false = single use
                  example: true
                item_type_id:
                  type: integer
                  description: Usage restrictions (0-4)
                  enum:
                    - 0
                    - 1
                    - 2
                    - 3
                    - 4
                  example: 0
                is_allow_empty_code:
                  type: boolean
                  description: Allow selling without code?
                  example: false
                category_id:
                  type:
                    - integer
                    - 'null'
                  description: Service category restriction (null = no restriction)
                  example: null
                balance_edit_type_id:
                  type: integer
                  description: Balance editability (1 = editable, 2 = not editable)
                  enum:
                    - 1
                    - 2
                  example: 1
                service_ids:
                  type: array
                  description: Specific service IDs (empty if no restriction)
                  items:
                    type: integer
                  example: []
                salon_ids:
                  type: array
                  description: Location IDs where certificate is valid
                  items:
                    type: integer
                  example:
                    - 720441
                expiration:
                  type: object
                  description: Expiration settings
                  required:
                    - type_id
                  properties:
                    type_id:
                      type: integer
                      description: >-
                        Expiration type: 0 = none, 1 = fixed date, 2 = period
                        from sale
                      enum:
                        - 0
                        - 1
                        - 2
                      example: 2
                    date:
                      type: string
                      format: date-time
                      description: >-
                        Fixed expiration date (ISO 8601, required if type_id =

  /kkm_transactions/{location_id}:
    get:
      tags:
        - Fiscalization
      security:
        - BearerPartnerUser: []
      summary: Get fiscal transactions
      operationId: get_fiscal_transaction_list
      description: >-
        Filters


        | Parameter | Description |

        | ------------- | ------------- |

        | page | Page number |

        | editable_length | Number of clients per page |

        | type | Operation type |

        | status | Operation status |

        | start_date | Period start date |

        | end_date | Period end date |


        <a name="kkm-transaction-types"></a>

        Types of all transactions with location account


        | Meaning | Description |

        | ------------- | ------------- |

        | 0 |  Sales operation – Active for documents of type Visit |

        | 1 | Sale return operation – Active for documents of type Visit |

        | 2 | Correction operation |

        | 4 | Shift opening operation – Opens a new POS shift |

        | 5 | Shift closing operation – Closes the current POS shift |

        | 9 | Get POS status – Retrieves the current status of the POS device |

        | 11 | Get POS team status – Retrieves the status of all POS devices
        connected to the team |

        | 12 | Correction operation |

        | 13 | Print X-report – Prints a non-fiscal summary report of the
        current shift |

        | 6 | Cash deposit – Registers a cash-in transaction in the POS |

        | 7 | Cash withdrawal – Registers a cash-out transaction in the POS |


        Statuses of All POS Operations


        | Meaning | Description |

        | ------------- | ------------- |

        | 0 |  Connection error with POS – Unable to establish a connection with
        the POS device |

        | 1 |  Success – Operation completed successfully |

        | 2 | Sent for printing – The request has been sent to the POS and is
        waiting for print completion |

        | 3 | Runtime error – An error occurred while processing the operation
        on the POS device |

        | 4 | Status check error – Failed to retrieve the current status of the
        POS |

        | 5 | Waiting for POS readiness – Operation is pending until the POS
        device becomes ready |


        Document Types


        | Meaning | Description |

        | ------------- | ------------- |

        | 1 | Sale of products |

        | 2 | Provision of services |

        | 3 | Arrival of products |

        | 4 | Products write-off |

        | 5 | Transfer of products |

        | 6 | Inventory |

        | 7 | Visit |

        | 8 | Consumables write-off |

        | 9 | Deposit replenishment |
      parameters:
        - name: page
          in: query
          description: Page number
          schema:
            type: number
          example: 1
        - name: editable_length
          in: query
          description: Number of customers per page
          schema:
            type: number
          example: 25
        - name: type
          in: query
          description: Type of transaction
          schema:
            type: number
          example: 20
        - name: status
          in: query
          description: Operation status
          schema:
            type: number
          example: 6
        - name: start_date
          in: query
          description: Period start date
          schema:
            type: number
          example: 20251201
        - name: end_date
          in: query
          description: Period end date
          schema:
            type: number
          example: 20251231
        - name: Accept
          in: header
          description: application/vnd.api.v2+json
          required: true
          schema:
            type: string
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer access_token, User user_token
          required: true
          schema:
            type: string
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/kkm_transactions_response_data_type'
              example:
                success: true
                data:
                  - id: 1059
                    print_date: '2026-09-21T23:00:00.000-05:00'
                    printed_count: 1
                    sum: 10
                    type:
                      id: 1
                      title: Sales return operation
                    status:
                      id: 3
                      title: Runtime error
                    document:
                      id: 2045
                      type: 7
                      type_title: Visit
                    cashier:
                      id: 746310
                      name: Jack Smith
                meta:
                  count: 1
        '401':
          description: Unauthorized

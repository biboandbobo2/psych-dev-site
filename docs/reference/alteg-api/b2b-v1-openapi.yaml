    user_permission_type:
      title: Model object "Permission type"
      description: Data on the permission type
      type: object
      properties:
        slug:
          type: string
          description: Name of the type
          enum:
            - has_access
            - has_group_access
            - has_limited_access
            - has_allowed_ids
            - has_limited_today
            - has_limited_by_own_access
            - last_days_count
            - allowed_ids
            - allowed_id
            - allowed_ip
        all_access_value:
          type:
            - string
            - 'null'
          description: >-
            A value that grants full access for this type of permission (can be
            number, string, or boolean)
        no_access_value:
          type:
            - string
            - 'null'
          description: >-
            A value that completely takes away access for this type of
            permission (can be number, string, or boolean)
      example:
        slug: has_group_access
        all_access_value: true
        no_access_value: false
    user_permission_option:
      title: Model object "Permission option"
      description: Data on the permission option
      type: object
      properties:
        title:
          type: string
          description: Title of the option
        value:
          type: number
          description: Value of the option
        is_disabled:
          type: boolean
          description: Availability of the option for use
      example:
        title: All positions
        value: 0
        is_disabled: false
    user_permission_with_children:
      title: Model object "Permission with nested permissions"
      description: Data on the permission with nested permissions
      type: object
      properties:
        slug:
          type: string
          description: Name of the permission
        title:
          type: string
          description: Title of the permission
        type:
          type: object
          description: Data about the type of permission
          allOf:
            - $ref: '#/components/schemas/user_permission_type'
        options:
          type:
            - array
            - 'null'
          description: Options list of the permission
          items:
            $ref: '#/components/schemas/user_permission_option'
        hint:
          type: string
          description: Text hint on the use of the permission
        is_recommended:
          type: boolean
          description: Is the permission recommended or optional
        is_editable:
          type: boolean
          description: Is the permission available for editing
        default_value:
          type:
            - string
            - 'null'
          description: >-
            Value of the permission by default (can be number, string, or
            boolean)
        entity_name:
          type:
            - string
            - 'null'
          description: The name of the entity to which this permission belongs
        is_paid:
          type: boolean
          description: Whether the permission is only available for paid staff members
        is_paid_only:
          type: boolean
          description: >-
            Whether the permission can only be assigned to paid staff members.
            Only applicable when the location has `is_paid_rights_model` enabled
        children:
          type:
            - array
            - 'null'
          description: Nested permissions (recursive structure, same schema as parent)
          items:
            type: object
            description: >-
              Nested permission object (same structure as
              UserPermissionWithChildren)
      example:
        slug: timetable_access
        title: Appointment calendar
        hint: ''
        is_recommended: true
        is_editable: true
        is_paid: false
        is_paid_only: false
        default_value: true
        entity_name: null
        children:
          - slug: timetable_position_id
            title: View the schedule and post records
            hint: ''
            is_recommended: true
            is_editable: true
            default_value: null
            entity_name: position
            children: null
            options:
              - title: All positions
                value: 0
                is_disabled: false
              - title: Administrator
                value: 1234
                is_disabled: false
            type:
              slug: allowed_id
              all_access_value: '0'
              no_access_value: '0'
        options: null
        type:
          slug: has_group_access
          all_access_value: true
          no_access_value: false
    user_role_with_salon_and_user:
      title: Model object "User role"
      description: Data on the user role
      type: object
      properties:
        slug:
          type: string
          description: Name of the role
          enum:
            - worker
            - administrator
            - accountant
            - manager
            - owner
            - free_readonly
            - free_readonly_admin
        title:
          type: string
          description: Title of the role
        description:
          type: string
          description: Description of the role
        weight:
          type: number
          description: Role weight which determines the number of available permissions
        user_permissions:
          type:
            - array
            - 'null'
          description: >
            List of permissions for this role

            Returned in response only if corresponding `include` is present in
            request.
          items:
            $ref: '#/components/schemas/user_permission_with_children'
      example:
        slug: staff_member
        title: team member
        description: Provides services
        weight: 1
        user_permissions:
          - slug: timetable_access
            title: Appointment calendar
            hint: ''
            is_recommended: true
            is_editable: true
            default_value: true
            entity_name: null
            children:
              - slug: timetable_position_id
                title: View the schedule and post records
                hint: ''
                is_recommended: true
                is_editable: true
                default_value: null
                entity_name: position
                children: null
                options:
                  - title: All positions
                    value: 0
                    is_disabled: false
                  - title: Administrator
                    value: 1234
                    is_disabled: false
                type:
                  slug: allowed_id
                  all_access_value: '0'
                  no_access_value: '0'
            options: null
            type:
              slug: has_group_access
              all_access_value: true
              no_access_value: false
    user_permission_value:
      title: Model object "Permission value"
      description: Data on the permission value
      type: object
      properties:
        slug:
          type: string
          description: Name of permission
        value:
          oneOf:
            - type: string
            - type: number
            - type: boolean
            - type: array
            - type: 'null'
          description: Value of permission (can be number, string, boolean, or array)
      example:
        slug: timetable_access
        value: true
    user_role_permissions:
      title: Model object "Permissions and user role"
      description: Data on the permissions and user role
      type: object
      properties:
        user_role:
          type: string
          description: Name of role
          enum:
            - worker
            - administrator
            - accountant
            - manager
            - owner
            - free_readonly
            - free_readonly_admin
        staff_id:
          type:
            - number
            - 'null'
          description: team member ID linked to user
        is_editable:
          type: boolean
          description: Are the permissions and role available for editing
        has_any_paid_permission:
          type:
            - boolean
            - 'null'
          description: Whether the user has at least one paid permission assigned
        user_permissions:
          type: array
          description: List of user permissions values
          items:
            $ref: '#/components/schemas/user_permission_value'
      example:
        is_editable: true
        staff_id: 12345
        user_role: owner
        has_any_paid_permission: null
        user_permissions:
          - slug: timetable_access
            value: true
          - slug: timetable_position_id
            value: 0
          - slug: auth_list_allowed_ip
            value: ''

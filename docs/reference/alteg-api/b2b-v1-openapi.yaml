    loyalty_certificates_response_data_types:
      title: Root Type for loyalty_certificates_response_data_types
      type: object
      properties:
        success:
          type: boolean
          description: Execution success status (true)
        data:
          type: array
          description: Array of objects with data
          items:
            type: object
            properties:
              id:
                type: integer
                description: Certificate ID
                format: int32
              number:
                type: string
                description: Certificate number
              balance:
                type: number
                description: Current balance
                format: float
              default_balance:
                type: number
                description: Starting balance
                format: float
              type_id:
                type: integer
                description: Certificate type identifier
                format: int32
              status_id:
                type: integer
                description: Status ID
                format: int32
              created_date:
                type: string
                description: Date of sale
                format: date-time
              expiration_date:
                type: string
                description: Burn date
                format: date-time
              type:
                type: object
                properties:
                  id:
                    type: integer
                    description: Certificate type identifier
                    format: int32
                  title:
                    type: string
                    description: Gift card type name
                  balance:
                    type: integer
                    description: Certificate denomination
                    format: int32
                  is_multi:
                    type: boolean
                    description: Is it available for multiple debits
                  company_group_id:
                    type: integer
                    description: ID of the chain where the certificate type was created
                    format: int32
                  item_type_id:
                    type: integer
                    description: >-
                      Restriction on the use of redemption points. 0 - no
                      restrictions, 1 - only services, 2 - some services + all
                      products, 3 - some services, 4 - only products
                    format: int32
                  expiration_type_id:
                    type: integer
                    description: >-
                      The ID of the expiration limit. 0 - unlimited, 1 - fixed
                      date, 2 - fixed period
                    format: int32
                  expiration_date:
                    type: string
                    description: >-
                      Burn date of all certificates. Populated with
                      expiration_type_id = 1
                    format: date-time
                  expiration_timeout:
                    type: integer
                    description: >-
                      Validity period of certificates. Populated with
                      expiration_type_id = 2
                    format: int32
                  expiration_timeout_unit_id:
                    type: integer
                    description: Time units. 1 - Day, 2 - Week, 3 - Month, 4 - Year
                    format: int32
                  is_allow_empty_code:
                    type: boolean
                    description: Sale without code
                  item_type:
                    type: object
                    properties:
                      id:
                        type: integer
                        description: Identifier of the expiration limit
                        format: int32
                      title:
                        type: string
                        description: Name of the constraint
                    description: Object with item_type_id and its name
                description: Object with certificate type information
              status:
                type: object
                properties:
                  id:
                    type: integer
                    description: Status ID
                    format: int32
                  title:
                    type: string
                    description: Status name
                description: >-
                  An object with information about the current status of the
                  certificate
        meta:
          type: object
          properties:
            count:
              type: integer
              format: int32
          description: Metadata (contains the number of certificates found)
      description: Get certificates
      example:
        success: true
        data:
          - id: 409726
            number: 888
            balance: 9000
            default_balance: 9000
            type_id: 27841
            status_id: 2
            created_date: '2026-09-21T23:00:00.000-05:00'
            expiration_date: '2026-09-21T23:00:00.000-05:00'
            type:
              id: 27841
              title: certificate 9000
              balance: 9000
              is_multi: true
              company_group_id: 128284
              item_type_id: 0
              expiration_type_id: 2
              expiration_timeout: 365
              expiration_timeout_unit_id: 1
              is_allow_empty_code: false
              item_type:
                id: 0
                title: No limits
            status:
              id: 2
              title: activated
        meta:
          count: 1
    loyalty_certificate_type_search_response_data_types:
      title: Root Type for loyalty_certificate_type_search_response_data_types
      type: object
      properties:
        success:
          type: boolean
          description: Execution success status (true)
        data:
          type: array
          description: Array of objects with data
          items:
            type: object
            properties:
              id:
                type: number
                description: Certificate type identifier
              title:
                type: string
                description: Gift card type name
              balance:
                type: number
                description: Certificate denomination
              is_multi:
                type: boolean
                description: >-
                  Write-off type: true - multiple write-off, false - single
                  write-off
              company_group_id:
                type: number
                description: ID of the chain where the certificate type is valid
              item_type_id:
                type: number
                description: Application restriction (list of possible values)
              expiration_type_id:
                type: number
                description: Expiration limit (list of possible values)
              expiration_date:
                type: string
                description: Fixed burn date in ISO8601 format (null if not set)
                format: date-time
              expiration_timeout:
                type: number
                description: >-
                  Certificate validity period from the date of sale (0 if not
                  set)
              expiration_timeout_unit_id:
                type: number
                description: >-
                  The unit of measurement of the validity period of the
                  certificate from the moment of sale (the list of possible
                  values, if not specified - 0)
              is_allow_empty_code:
                type: boolean
                description: >-
                  Allow sale of certificate without code? true - allow, false -
                  do not allow
        meta:
          type: object
          properties:
            count:
              type: integer
              format: int32
          description: Metadata (contains the number of certificate types found)
      description: Get a List of Available Gift Card Types
      example:
        success: true
        data:
          - id: 1
            title: Fixed burn date certificate without application restrictions
            balance: 10
            is_multi: true
            company_group_id: 12
            item_type_id: 0
            expiration_type_id: 1
            expiration_date: '2026-09-21T23:00:00.000-05:00'
            expiration_timeout: 0
            expiration_timeout_unit_id: 0
            is_allow_empty_code: true
          - id: 11
            title: >-
              Certificate valid for 6 months from the date of sale for any goods
              without services
            balance: 100
            is_multi: false
            company_group_id: 12
            item_type_id: 2
            expiration_type_id: 2
            expiration_timeout: 6
            expiration_timeout_unit_id: 3
            is_allow_empty_code: false
        meta:
          count: 2
    company_loyalty_programs_search_data_types:
      title: Root Type for company_loyalty_programs_search_data_types
      type: object
      properties:
        success:
          type: boolean
          description: Execution success status.
        data:
          type: array
          description: An array of data objects.
          items:
            type: object
            properties:
              id:
                type: integer
                description: Promotion ID
                format: int32
              title:
                type: string
                description: Share name
              type:
                type: string
                description: Promotion type
                enum:
                  - discount_static
                  - discount_accumulative_visits
                  - discount_accumulative_sold
                  - discount_accumulative_paid
                  - cashback_static_sold
                  - cashback_static_paid
                  - cashback_accumulative_paid
                  - cashback_accumulative_sold
                  - cashback_accumulative_paid_visits
                  - cashback_accumulative_sold_visits
                  - cashback_sold_visits
                  - cashback_paid_visits
                  - package_discount
              loyalty_type_id:
                type: integer
                description: Promotion type ID
                format: int32
              item_type_id:
                type: integer
                description: Identifier of the discount application type
                format: int32
              service_item_type:
                type: string
                description: Type of application to services
                enum:
                  - any_allowed
                  - not_allowed
                  - custom_allowed
              good_item_type:
                type: string
                description: Type of application to products
                enum:
                  - any_allowed
                  - not_allowed
                  - custom_allowed
              value_unit_id:
                type: integer
                description: Unit ID of the bonus or discount
                format: int32
              value_unit:
                type: string
                description: Bonus or discount measurement unit (percentage, fixed amount)
                enum:
                  - percent
                  - amount
              group_id:
                type: integer
                description: Chain ID
                format: int32
              usage_limit:
                type: integer
                description: Limit on the number of applications (only for cashback)
                format: int32
              visit_multiplicity:
                type: integer
                description: Multiplicity of application by visits (only for cashback)
                format: int32
              sold_items_multiplicity:
                type: integer
                description: >-
                  How many services you need to pay to get a discount on
                  promotional services (only for the promotion type "Discount by
                  condition")
                format: int32
              current_package_progress:
                type: integer
                description: The current number of uses of the promotion
                format: int32
              allowed_usages_amount:
                type: integer
                description: Limitation on the number of allowed uses
                format: int32
              expiration_timeout:
                type: integer
                description: Expiration date of bonuses or discounts
                format: int32
              expiration_timeout_unit:
                type: string
                description: >-
                  The unit of measurement for the expiration date of bonuses or
                  discounts
                enum:
                  - day
                  - week
                  - month
                  - year
              expiration_notification_timeout:
                type: integer
                description: >-
                  How many days before the bonus or discount expires, you need
                  to send a notification to the client
                format: int32
              params_source_type:
                type: string
                description: >-
                  Where to get the client's history to calculate the size of the
                  bonus or discount (for accumulation promotions or conditional
                  discounts)
                enum:
                  - loyalty_card
                  - active_companies
                  - chain
              history_start_date:
                type: string
                description: >-
                  From what date to take into account the client's history to
                  calculate the size of the bonus or discount (for accumulative
                  promotions or conditional discounts)
              on_changed_notification_template_id:
                type: integer
                description: Notification template ID when changing bonus or discount
                format: int32
              on_expiration_notification_template_id:
                type: integer
                description: >-
                  Identifier of the notification template when a bonus or
                  discount burns
                format: int32
              first_transaction_date:
                type: string
                description: Date of first stock transaction
        meta:
          type: object
          properties:
            count:
              type: integer
              description: Number of objects found
              format: int32
          description: Metadata (contains the number of objects found)
      description: Getting a list of stocks available for a location
      example:
        success: true
        data:
          - id: 53591
            title: 100 USD discount on Altegio Implementation Consultation
            type: discount_static
            loyalty_type_id: 1
            item_type_id: 4
            service_item_type: custom_allowed
            good_item_type: any_allowed
            value_unit_id: 2
            value_unit: amount
            group_id: 502054
            usage_limit: 0
            visit_multiplicity: 1
            sold_items_multiplicity: 1
            current_package_progress: 0
            allowed_usages_amount: 0
            expiration_timeout: 0
            expiration_timeout_unit: day
            expiration_notification_timeout: 0
            params_source_type: loyalty_card
            on_changed_notification_template_id: 0
            on_expiration_notification_template_id: 0
        meta:
          count: 1

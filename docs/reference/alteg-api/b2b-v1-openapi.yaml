    response_meta_date_paginator_object:
      title: An object of date-based pagination information.
      description: >
        Page navigation information containing information about the current,
        next, and previous pages.

        The data is sorted and paginated by date in descending order.
      type: object
      properties:
        dateCursor:
          type: object
          description: Pagination information.
          properties:
            previous:
              type: object
              description: Information about the previous page.
              properties:
                to:
                  type:
                    - string
                    - 'null'
                  description: >-
                    Up to which date, inclusive, the data on the previous page
                    is filtered.
                  format: date
                from:
                  type:
                    - string
                    - 'null'
                  description: From what date the data on the previous page is filtered.
                  format: date
                count:
                  type:
                    - number
                    - 'null'
                  description: Number of items on the previous page.
            current:
              type: object
              description: Information about the current page.
              properties:
                to:
                  type:
                    - string
                    - 'null'
                  description: >-
                    Up to which date, inclusive, the data on the current page is
                    filtered.
                  format: date
                from:
                  type:
                    - string
                    - 'null'
                  description: From what date the data on the current page is filtered.
                  format: date
                count:
                  type:
                    - number
                    - 'null'
                  description: Number of items on the current page.
            next:
              type: object
              description: Information about the previous page.
              properties:
                to:
                  type:
                    - string
                    - 'null'
                  description: >-
                    Up to which date, inclusive, the data on the next page is
                    filtered.
                  format: date
                from:
                  type:
                    - string
                    - 'null'
                  description: From what date the data on the next page is filtered.
                  format: date
                count:
                  type:
                    - number
                    - 'null'
                  description: Number of items on the next page.
      example:
        dateCursor:
          previous:
            to: '2022-01-31'
            from: '2022-01-20'
            count: 7
          current:
            to: '2022-01-19'
            from: '2022-01-15'
            count: 25
          next:
            to: '2022-01-14'
            from: '2022-01-05'
            count: 25

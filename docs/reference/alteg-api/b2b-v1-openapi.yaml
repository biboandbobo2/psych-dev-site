          items:
            type: integer
            format: int32
        allowed_good_ids:
          type: array
          description: Item IDs (if application type is set for some items)
          items:
            type: integer
            format: int32
        allowed_good_category_ids:
          type: array
          description: >-
            Product category identifiers (if application type is set for some
            products)
          items:
            type: integer
            format: int32

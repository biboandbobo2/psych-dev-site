paths:
  /auth:
    post:
      tags:
        - Authentication B2B
      security: []
      summary: Authorize User
      description: "When a user changes their password, their API key is regenerated. As a result, reauthorization is required using the new API key.\r\n\r\n| Attribute | Type | Description |\r\n| ------------- | ------------- | ------------- |\r\n| login | string | The user's phone number in the format +13155550175, or their email address.|\r\n| password | string | User password |"
      operationId: authorize_user
      parameters:
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/auth_request'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth_response'
              example:
                success: true
                data:
                  id: 123456
                  user_token: wec23fh8cDfFV4432fc352456
                  name: James Smith
                  phone: '+13155550175'
                  login: j.smith
                  email: j.smith@example.com
                  avatar: >-
                    https://assets.alteg.io/general/0/01/123456789098765_12345678909876.png
                  is_approved: true
                  is_email_confirmed: false
                meta: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'
      x-codegen-request-body-name: body
  /companies:
    get:
      tags:
        - Locations
      security:
        - BearerPartner: []
      summary: Get a list of locations
      description: Get a list of locations with data
      operationId: get_location_list
      parameters:
        - name: id
          in: query
          description: Filter by location ID
          schema:
            type: number
          example: 4564
        - name: group_id
          in: query
          description: 'Filter by location chain ID _Default: 83_'
          schema:
            type: number
          example: 83
        - name: my
          in: query
          description: >-
            For authorized user only. If you need locations that the user has
            rights to manage
          schema:
            type: number
          example: 1
        - name: active
          in: query
          description: >-
            If you need to get only locations with an active license and an
            available appointment
          schema:
            type: number
          example: 1
        - name: moderated
          in: query
          description: >-
            If you need to get only moderated locations, whose content is
            checked for publication
          schema:
            type: number
          example: 1
        - name: forBooking
          in: query
          description: >-
            Include date and time of the next free session in the location
            (ISO8601)
          schema:
            type: number
          example: 1
        - name: show_groups
          in: query
          description: >-
            Include in the location object a list of chains that this location
            belongs to
          schema:
            type: number
          example: 1
        - name: city_id
          in: query
          description: Filter by city ID ([cities getting method](#cities))
          schema:
            type: number
          example: 2
        - name: showBookforms
          in: query
          description: >-
            Include in the location object a list of location online booking
            forms
          schema:
            type: number
          example: 1
        - name: min_id
          in: query
          description: Filter by minimum location ID
          schema:
            type: number
          example: 1000
        - name: show_deleted
          in: query
          description: Include deleted locations
          schema:
            type: number
          example: 1
        - name: hide_record_type_single
          in: query
          description: Hide locations with individual appointment
          schema:
            type: number
          example: 1
        - name: hide_record_type_activity
          in: query
          description: Hide locations with group appointment
          schema:
            type: number
          example: 1
        - name: hide_record_type_mixed
          in: query
          description: Hide locations with mixed appointment
          schema:
            type: number
          example: 1
        - name: business_group_id
          in: query
          description: Filter by business group ID
          schema:
            type: number
          example: 1
        - name: business_type_id
          in: query
          description: Filter by business type ID
          schema:
            type: number
          example: 1
        - name: include
          in: query
          description: Include additional data in the location object
          schema:
            type: array
            items:
              type: string
              enum:
                - staff
                - positions
                - accounts
                - storages
                - expenses
          example:
            - staff
            - positions
        - name: count
          in: query
          description: Number of locations per page
          schema:
            type: number
        - name: page
          in: query
          description: Page number
          schema:
            type: number
        - name: Accept
          in: header
          description: Must be `application/vnd.api.v2+json`
          required: true
          schema:
            type: string
        - name: Content-Type
          in: header
          description: Must be `application/json`
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/companies_data_types'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
    post:
      tags:
        - Locations
      security:
        - BearerPartnerUser: []

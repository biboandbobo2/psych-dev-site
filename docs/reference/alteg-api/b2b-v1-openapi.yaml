  /company/{location_id}/settings/timeslots:
    get:
      tags:
        - Online Booking Settings
      security:
        - BearerPartnerUser: []
      summary: Get timeslot settings
      description: >
        Retrieves the timeslot configuration for online booking at a location.


        Timeslot settings control how available booking times are displayed to
        clients:

        - Grid type (predefined, schedule-based, or dynamic)

        - Available time range

        - Step interval between slots

        - Delay before nearest available slot

        - Per-weekday and per-date overrides


        **Timeslot values are in seconds from midnight** (e.g., 7200 = 02:00,
        50400 = 14:00).
      operationId: get_timeslot_settings
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
      responses:
        '200':
          description: Timeslot settings retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Timeslot settings object
                    properties:
                      is_enabled:
                        type: boolean
                        description: Whether custom timeslots are enabled
                        example: true
                      weekdays_settings:
                        type: array
                        description: Settings for each day of the week
                        items:
                          type: object
                          properties:
                            weekday:
                              type: integer
                              description: Day of week (1 = Monday, 7 = Sunday)
                              minimum: 1
                              maximum: 7
                              example: 1
                            timeslots:
                              type: array
                              description: |
                                Available timeslots in seconds from midnight.
                                Only used when grid_base_type = "predefined".
                              items:
                                type: integer
                              example:
                                - 7200
                                - 14400
                                - 21600
                            setting:
                              type: object
                              description: Grid generation rules
                              properties:
                                grid_first_timeslot:
                                  type: integer
                                  description: >-
                                    Earliest available slot time in seconds from
                                    midnight
                                  example: 0
                                grid_last_timeslot:
                                  type: integer
                                  description: >-
                                    Latest available slot time in seconds from
                                    midnight
                                  example: 85800
                                grid_display_step:
                                  type: integer
                                  description: Interval between displayed slots in seconds
                                  example: 7200
                                grid_nearest_timeslot_delay:
                                  type: integer
                                  description: >-
                                    Minimum delay before nearest available slot
                                    in seconds
                                  example: 1800
                                grid_base_type:
                                  type: string
                                  description: >-
                                    Grid type: predefined, schedule, or
                                    timeslots
                                  enum:
                                    - predefined
                                    - schedule
                                    - timeslots
                                  example: predefined
                                is_grid_flexible:
                                  type: boolean
                                  description: Whether to add a flexible slot option
                                  example: false
                      dates_settings:
                        type: array
                        description: Per-date overrides (e.g., holidays, special days)
                        items:
                          type: object
                          properties:
                            date:
                              type: string
                              format: date
                              description: Date for override (YYYY-MM-DD)
                              example: '2026-12-25'
                            timeslots:
                              type: array
                              description: >-
                                Available timeslots for this date (empty =
                                unavailable)
                              items:
                                type: integer
                              example: []
                            setting:
                              type: object
                              description: Grid generation rules
                              properties:
                                grid_first_timeslot:
                                  type: integer
                                  example: 0
                                grid_last_timeslot:
                                  type: integer
                                  example: 85800
                                grid_display_step:
                                  type: integer
                                  example: 7200
                                grid_nearest_timeslot_delay:
                                  type: integer
                                  example: 1800
                                grid_base_type:
                                  type: string
                                  enum:
                                    - predefined
                                    - schedule
                                    - timeslots
                                  example: predefined
                                is_grid_flexible:
                                  type: boolean
                                  example: false
                  meta:
                    type: array
                    example: []
              example:
                success: true
                data:
                  is_enabled: true
                  weekdays_settings:
                    - weekday: 1
                      timeslots:
                        - 7200
                        - 14400
                      setting:
                        grid_first_timeslot: 0
                        grid_last_timeslot: 85800
                        grid_display_step: 7200
                        grid_nearest_timeslot_delay: 1800
                        grid_base_type: predefined
                        is_grid_flexible: false
                  dates_settings:
                    - date: '2026-12-25'
                      timeslots: []
                      setting:
                        grid_first_timeslot: 0
                        grid_last_timeslot: 85800
                        grid_display_step: 7200
                        grid_nearest_timeslot_delay: 1800
                        grid_base_type: predefined
                        is_grid_flexible: false
                meta: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Location not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object

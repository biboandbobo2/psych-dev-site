                        type: boolean
                        example: true
                      company_group_id:
                        type: integer
                        description: Chain ID
                        example: 706028
                      category_id:
                        type:
                          - integer
                          - 'null'
                        example: null
                      weight:
                        type: integer
                        description: Sort order
                        example: 1
                      item_type_id:
                        type: integer
                        example: 0
                      expiration_type_id:
                        type: integer

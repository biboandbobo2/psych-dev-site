  /company/{location_id}/schedules:
    post:
      tags:
        - Schedule & Resources
      summary: Create a Schedule
      description: >
        Creates a schedule for appointments or events based on the original
        associated entity.
      operationId: create_timetable_event_schedule
      security:
        - BearerPartnerUser: []
      parameters:
        - $ref: '#/components/parameters/accept_header'
        - $ref: '#/components/parameters/content_type_header'
        - $ref: '#/components/parameters/company_id'
        - $ref: '#/components/parameters/include_for_schedule'
      requestBody:
        content:
          application/json:
            schema:
              required:
                - original_entity_type
                - original_entity_id
                - date_end
                - add_clients_from_original_entity
                - days
              type: object
              properties:
                original_entity_type:
                  type: string
                  description: >
                    Type of entity the schedule will be based on:  

                    `record` - individual appointment, currently not
                    supported;  

                    `activity` - group event.
                  enum:
                    - record
                    - activity
                  example: activity
                original_entity_id:
                  type: number
                  description: ID of entity the schedule will be based on.
                  example: 123
                date_end:
                  type: string
                  description: Date of the schedule end.
                  format: date
                  example: '2022-02-01'
                add_clients_from_original_entity:
                  type: boolean
                  description: Add clients from original entity to all scheduled events.
                  example: false
                days:
                  type: array
                  description: >-
                    Each object represents schedule series settings for a
                    specific day of the week. A minimum of 1 and a maximum of 7
                    schedule series can be defined (one for each day of the
                    week).
                  minItems: 1
                  maxItems: 7
                  items:
                    required:
                      - day_of_week
                      - events_master_id
                      - events_time
                      - events_duration
                      - events_capacity
                    type: object
                    properties:
                      day_of_week:
                        type: string
                        description: The day of the week for the schedule series.
                        enum:
                          - mon
                          - tue
                          - wed
                          - thu
                          - fri
                          - sat
                          - sun
                        example: mon
                      events_master_id:
                        type: number
                        description: >-
                          The ID of the team member assigned to the events in
                          the schedule series.
                        example: 123
                      events_time:
                        type: string
                        description: >-
                          Start time of the events in the schedule series,
                          formatted as HH:MM:SS.
                        example: '14:00:00'
                      events_duration:
                        type: number
                        description: >-
                          Duration of each event in the schedule series, in
                          seconds.
                        example: 3600
                      events_capacity:
                        type: number
                        description: >-
                          The capacity of activities in the schedule series. For
                          appointments, this should be set to 1.
                        example: 4
                      labels_ids:
                        type: array
                        description: >-
                          An array of tag IDs associated with the events in the
                          schedule series.
                        items:
                          type: number
                          example: 123
                      resource_instances_ids:
                        type: array
                        description: >-
                          An array of resource instance IDs used in the events
                          of the schedule series.
                        items:
                          type: number
                          example: 123
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    $ref: '#/components/schemas/response_success_true_object'
                  data:
                    $ref: '#/components/schemas/timetable_event_schedule'
                  meta:
                    $ref: '#/components/schemas/response_meta_empty_object'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/422_unprocessable_entity_response'

    client_visits_history_goods_transaction_good:
      title: The object of the model "Sold product in the history of customer visits"
      description: Data of the product sold.
      type: object
      properties:
        id:
          type: number
          description: Product ID.
        title:
          type: string
          description: Name of product.
        amount:
          type: number
          description: Number of products sold.
        unit:
          type: string
          description: Unit of measure for the product sold.
        cost_per_unit:
          type: number
          description: Unit price without discount.
        first_cost:
          type: number
          description: Price of the whole product without discount.
        discount_percent:
          type: number
          description: Percent discount.
        cost_to_pay:
          type: number
          description: Price of the product including the discount.
        paid_sum:
          type: number
          description: Price of the product including the discount.
        payment_status:
          type: string
          description: |
            Visit payment status:  
              `not_paid` - the visit is not paid, no payments were made for the visit;  
              `paid_not_full` - the visit is partially paid;  
              `paid_full` - the visit is paid in full, there is no overpayment;  
              `paid_over` - there is an overpayment for the visit.
          enum:
            - not_paid
            - paid_not_full
            - paid_full
            - paid_over
      example:
        id: 123
        title: My product
        amount: -1
        unit: PCS.
        cost_per_unit: 1000
        first_cost: -1000
        discount_percent: 0
        cost_to_pay: 1000
        paid_sum: 1000
        payment_status: paid_full

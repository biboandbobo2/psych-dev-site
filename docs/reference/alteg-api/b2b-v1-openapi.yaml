        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token, User user_token
          required: true
          schema:
            type: integer
        - name: title
          in: query
          description: Gift card type name
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: number
        - name: page_size
          in: query
          description: The number of output lines per page. Maximum 100
          schema:
            type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: >-
                  #/components/schemas/loyalty_certificate_type_search_response_data_types
              example:
                success: true
                data:
                  - id: 1
                    title: >-
                      Fixed burn date certificate without application
                      restrictions
                    balance: 10
                    is_multi: true
                    company_group_id: 12
                    item_type_id: 0
                    expiration_type_id: 1
                    expiration_date: '2026-09-21T23:00:00.000-05:00'
                    expiration_timeout: 0
                    expiration_timeout_unit_id: 0
                    is_allow_empty_code: true
                  - id: 11
                    title: >-
                      Certificate valid for 6 months from the date of sale for
                      any goods without services
                    balance: 100
                    is_multi: false
                    company_group_id: 12
                    item_type_id: 2
                    expiration_type_id: 2
                    expiration_timeout: 6
                    expiration_timeout_unit_id: 3

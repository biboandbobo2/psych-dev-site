  /company/{location_id}/loyalty/certificate_types/search:
    get:
      tags:
        - Subscriptions & Certificates
      security:
        - BearerPartnerUser: []
      summary: Get a List of Available Gift Card Types
      description: >-
        A list of **gift card types** available at a location can be obtained by
        querying the location ID.

        The list can be filtered by the name of the gift card type by passing
        the title parameter.

        Pagination is supported, specified by the `page` and `page_size`
        parameters.


        The list is an array of [gift card types](#loyalty-certificate-type).


        <a name="loyalty-certificate-type"></a>

        **Gift card type** has the following structure:


        | Field                      | Type    |
        Description                                                                                                                       
        |

        |----------------------------|---------|------------------------------------------------------------------------------------------------------------------------------------|

        | id                         | number  | Gift card type
        identifier                                                                                                         
        |

        | title                      | string  | Gift card type
        name                                                                                                               
        |

        | balance                    | number  | Gift card
        denomination                                                                                                          
        |

        | is_multi                   | boolean | Write-off type: true - multiple
        write-off, false - single
        write-off                                                              
        |

        | company_group_id           | number  | ID of the chain where the gift
        card type is
        valid                                                                                 
        |

        | item_type_id               | number  | Application Constraint (list of
        possible
        values)                                                                                  
        |

        | expiration_type_id         | number  | Expiration limit (list of
        possible
        values)                                                                                        
        |

        | expiration_date            | string  | Fixed burn date in ISO8601
        format (null if not
        set)                                                                               
        |

        | expiration_timeout         | number  | Gift card validity period from
        the date of sale (0 if not
        set)                                                                    
        |

        | expiration_timeout_unit_id | number  | The unit of measurement of the
        validity period of the gift card from the moment of sale (list of
        possible values, if not set - 0) |

        | is_allow_empty_code        | boolean | Allow sale of gift card without
        code? true - allow, false - do not
        allow                                                           |


        <a name="loyalty-certificate-item-type"></a>

        **Gift Card Type Restriction**


        | Meaning | Description                     |

        |---------|---------------------------------|

        | 0       | Unlimited                       |

        | 1       | Any services without products   |

        | 2       | Any products without services   |

        | 3       | Some services without products  |

        | 4       | Some services and any products  |


        <a name="loyalty-certificate-expiration-type"></a>

        **Gift Card Type Expiration Limit**


        | Meaning | Description                            |

        |---------|----------------------------------------|

        | 0       | No expiration date                     |

        | 1       | Fixed date for all instances           |

        | 2       | Fixed period of validity from the date of sale |


        <a name="loyalty-certificate-expiration-unit"></a>

        **Units of certificate type validity period**


        | Meaning | Description |

        |---------|-------------|

        | 1       | Day         |

        | 2       | Week        |

        | 3       | Month       |

        | 4       | Year        |
      operationId: get_gift_card_type_list
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string

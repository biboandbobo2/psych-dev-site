          type: array
          description: Service parameters (id, cost, discount)
          items:
            type: object
            properties:
              id:
                type: number
                description: Service ID
              first_cost:
                type: number
                description: Initial cost of the service
              discount:
                type: number
                description: Service discount
              cost:
                type: number
                description: The total cost of the service
                format: float
        client:
          type: object
          properties:
            phone:
              type: string
              description: Customer phone number
            name:
              type: string
              description: Client name
            email:
              type: string
              description: Client Email
          description: Client parameters (phone, name, email)
        save_if_busy:
          type: boolean
          description: >-
            Whether to keep the appointment if the time is busy or non-working,
            or give an error
        datetime:
          type: string
          description: Date and time of appointment
          format: date-time
        seance_length:
          type: number
          description: Appointment duration in seconds
        send_sms:
          type: boolean
          description: >-
            Whether to send SMS with the details of the appointment to the
            client
        comment:
          type: string
          description: Appointment Comment
        sms_remain_hours:
          type: number
          description: >-
            Specifies how many hours before the visit an SMS reminder should be
            sent to the client. Set to 0 if no reminder is needed.
        email_remain_hours:
          type: number
          description: >-
            Specifies how many hours before the visit an email reminder should
            be sent to the client. Set to 0 if no reminder is needed.
        attendance:
          type: number
          description: >-
            Appointment status (2 - User confirmed the appointment, 1 - User
            came, services provided, 0 - user waiting, -1 - user did not show)
        api_id:
          type: string
          description: External system ID
        custom_color:
          type: string
          description: Appointment color
        record_labels:
          type: array
          description: Array of post category IDs
          items:
            type: string
        technical_break_duration:
          oneOf:
            - type: number
              minimum: 0
              maximum: 3600
            - type: 'null'
          description: >
            Technical break duration in seconds.

            - Must be in multiples of 300 (5-minute intervals)

            - Maximum value is 3600 (1 hour)

            - If null or not provided, uses location default from Settings →
            Appointment Log → Technical Breaks
        custom_fields:
          type: object
          properties:
            my_custom_field:
              type: integer
              format: int32
            some_another_field:
              type: array
              items:
                type: string
          description: Custom appointment fields
      description: Create a New Appointment
      example:

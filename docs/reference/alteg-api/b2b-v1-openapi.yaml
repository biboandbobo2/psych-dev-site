  /api/v1/company/{location_id}/client/{client_id}/loyalty/abonements/search_for_activity:
    get:
      tags:
        - Subscriptions & Certificates
      security:
        - BearerPartner: []
      summary: Search available subscriptions for event
      description: >
        Retrieves subscriptions that can be used to create a client schedule for
        a series of events.


        This method returns subscriptions (memberships) that:

        - Belong to the specified client

        - Are valid and active

        - Can be applied to the specified activity

        - Have remaining visits available


        **Use cases:**

        - Display available subscriptions when scheduling recurring activity
        sessions

        - Check which subscriptions cover specific activity types

        - Validate subscription applicability before creating schedules


        **Note:** Returns subscriptions with their types and availability
        intervals.
      operationId: search_memberships_for_event
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
        - name: client_id
          in: path
          description: Client ID
          required: true
          schema:
            type: integer
          example: 146915197
        - name: event_id
          in: query
          description: Event (group event) ID
          required: true
          schema:
            type: integer
          example: 12345
      responses:
        '200':
          description: List of available subscriptions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Membership instance ID
                          example: '5248829'
                        type:
                          type: string
                          example: loyalty_abonement
                        attributes:
                          type: object
                          properties:
                            number:
                              type: string
                              description: Subscription number
                              example: '690348'
                            balance:
                              type: integer
                              description: Remaining visits
                              example: 10
                        relationships:
                          type: object
                          properties:
                            loyalty_abonement_type:
                              type: object
                              properties:
                                data:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                      example: '489159'
                                    type:
                                      type: string
                                      example: loyalty_abonement_type
                  included:
                    type: array
                    description: Related membership types and availability intervals
                    items:
                      type: object
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Event or client not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Event not found
  /api/v1/company/{location_id}/client/{client_id}/loyalty/abonements/{membership_id}/check_for_activity:
    get:
      tags:
        - Subscriptions & Certificates
      security:
        - BearerPartner: []
      summary: Check membership availability for event
      description: |
        Validates a specific subscription for creating activity schedules.

        Returns:
        - **Last possible appointment date** based on membership expiration
        - **Available visit count** for the selected subscription
        - **Schedule day IDs** that can be booked

        **Use cases:**
        - Validate subscription before creating recurring appointments
        - Check if subscription has enough visits for schedule
        - Determine last bookable date based on expiration
        - Pre-validate schedule parameters

        **Note:** Requires schedule_day_ids parameter to check specific dates.
      operationId: check_memberships_for_event
      parameters:
        - name: Accept
          in: header
          required: true
          schema:
            type: string
            default: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          required: true
          schema:
            type: string
            default: application/json
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer {partner_token}, User {user_token}
        - name: location_id
          in: path
          description: Location ID
          required: true
          schema:
            type: integer
          example: 720441
        - name: client_id
          in: path
          description: Client ID
          required: true
          schema:
            type: integer
          example: 146915197
        - name: membership_id
          in: path
          description: Membership instance ID
          required: true
          schema:
            type: integer
          example: 5248829
        - name: event_id
          in: query
          description: Event (group event) ID
          required: true
          schema:
            type: integer
          example: 12345
        - name: schedule_day_ids
          in: query
          description: Comma-separated list of schedule day IDs to check
          required: true
          schema:
            type: string
          example: 1,2,3,4,5
      responses:
        '200':
          description: Subscription availability information
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        description: Check result ID
                        example: check_1
                      type:
                        type: string
                        example: loyalty_abonement_check
                      attributes:
                        type: object
                        properties:
                          last_booking_date:
                            type: string
                            format: date-time
                            description: >-
                              Last possible appointment date (based on
                              membership expiration)
                            example: '2026-03-31T23:59:59+00:00'
                          available_visits:
                            type: integer
                            description: Number of visits available in membership
                            example: 10
                          can_book_all_days:
                            type: boolean
                            description: >-
                              Whether membership can cover all requested
                              schedule days
                            example: true
                          bookable_day_ids:
                            type: array
                            description: Schedule day IDs that can be booked
                            items:
                              type: integer
                            example:
                              - 1
                              - 2
                              - 3
                              - 4
                              - 5
        '400':
          description: Bad Request - invalid parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Invalid schedule_day_ids
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '403':
          description: Forbidden - insufficient permissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
        '404':
          description: Event, client, or membership not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  data:
                    type: 'null'
                  meta:
                    type: object
                    properties:
                      message:
                        type: string
                        example: Event not found
  /loyalty/certificates:
    get:
      tags:
        - Subscriptions & Certificates
      security:
        - BearerPartner: []
      summary: Get client gift cards
      description: >-
        Returns a list of client gift cards by phone


        | Attribute         | Type      |
        Description                                                             
        |

        |-------------------|-----------|---------------------------------------------------------------------------|

        | id                | int       | Gift card
        ID                                                              |

        | number            | string    | Gift card
        code                                                            |

        | balance           | decimal   | Current
        balance                                                           |

        | default_balance   | decimal   | Initial
        balance                                                           |

        | type_id           | int       | Gift card type
        identifier                                                 |

        | status_id         | int       | Status
        ID                                                                 |

        | created_date      | timestamp | Date of
        sale                                                              |

        | expiration_date   | datetime  | Burn
        date                                                                 |

        | type              | object    | Object with gift card type
        information                                    |

        | status            | object    | An object with information about the
        current gift card status             |


        The type array contains the following objects:


        | Attribute                | Type      |
        Description                                                                                                          
        |

        |--------------------------|-----------|-----------------------------------------------------------------------------------------------------------------------|

        | id                       | int       | Gift card type
        identifier                                                                                           
        |

        | title                    | string    | Type
        name                                                                                                            
        |

        | balance                  | decimal   | Gift card
        denomination                                                                                              
        |

        | is_multi                 | boolean   | Is it available for multiple
        debits                                                                                 
        |

        | company_group_id         | int       | ID of the chain where the
        certificate type was
        created                                                               |

        | item_type_id             | int       | Restriction on the use of
        redemption points. 0 - no limit, 1 - services only, 2 - some services +
        all products, 3 - some services, 4 - products only |

        | expiration_type_id       | int       | The ID of the expiration limit.
        0 - unlimited, 1 - fixed date, 2 - fixed
        term                                        |

        | expiration_date          | timestamp | Burn date of all gift cards.
        Populated with expiration_type_id =
        1                                                  |

        | expiration_timeout       | int       | Validity period of gift card.
        Populated with expiration_type_id =
        2                                                 |

        | expiration_timeout_unit_id | int     | Time units. 1 - Day, 2 - Week,
        3 - Month, 4 -
        Year                                                                   |

        | is_allow_empty_code      | boolean   | Sale without
        code                                                                                                   
        |

        | item_type                | object    | Object with item_type_id and
        its
        name                                                                              
        |
      operationId: get_client_gift_cards
      parameters:
        - name: copmany_id
          in: query
          description: Location ID
          required: true
          schema:
            type: number
        - name: phone
          in: query
          description: Customer phone number
          required: true
          schema:
            type: number
        - name: Accept
          in: header
          description: application/vnd.api.v2+json
          required: true
          schema:
            type: string
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token, User user_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/loyalty_certificates_response_data_types'
              example:
                success: true
                data:
                  - id: 409726
                    number: 888
                    balance: 9000
                    default_balance: 9000
                    type_id: 27841
                    status_id: 2
                    created_date: '2026-09-21T23:00:00.000-05:00'
                    expiration_date: '2026-09-21T23:00:00.000-05:00'
                    type:
                      id: 27841
                      title: certificate 9000
                      balance: 9000
                      is_multi: true
                      company_group_id: 128284
                      item_type_id: 0
                      expiration_type_id: 2
                      expiration_timeout: 365
                      expiration_timeout_unit_id: 1
                      is_allow_empty_code: false
                      item_type:
                        id: 0
                        title: No limits
                    status:
                      id: 2
                      title: activated
                meta:
                  count: 1
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'

        history_start_date: '2026-09-21'
        loyalty_card_type_ids:
          - 51
          - 29
        on_changed_notification_template:
          type: custom
          body: Your discount has changed
        on_expiration_notification_template:
          type: big
        rules:
          - parameter: 10
            value: 2.5
            service_id: 0
          - parameter: 30
            value: 7.5
            service_id: 0
        company_ids:
          - 49

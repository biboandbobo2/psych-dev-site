    fiscalization_request_data_types:
      title: Root Type for fiscalization_request_data_types
      type: object
      properties:
        id:
          type: string
          description: Unique ID of the sales document
        date:
          type: string
          description: >-
            Date and time the document was sent for printing (in ISO-8601
            format)
          format: date-time
        document_id:
          type: integer
          description: Internal document identifier in the Altegio system
          format: int32
        type:
          type: string
          description: Document type (list of possible values)
          enum:
            - sale
            - return
        print_receipt:
          type: boolean
          description: Whether to print a paper check at the checkout during fiscalization
        customer:
          type: object
          properties:
            email:
              type: string
              description: Client Email
            phone:
              type: string
              description: Customer phone
          description: Client entity
        positions:
          type: array
          description: List of positions in the check
          items:
            type: object
            properties:
              type:
                type: string
                description: >-
                  Position type ("service" - service / "commodity" - product /
                  "payment" - payment)
              title:
                type: string
                description: Position name
              price:
                type: number
                description: Position price with an accuracy of 2 decimal places
                format: double
              quantity:
                type: integer
                description: Quantity
                format: int32
              discount_amount:
                type: number
                description: >-
                  Discount applied to a position with an accuracy of 2 decimal
                  places
                format: double
              vat:
                type: string
                description: Type of VAT (slug from VAT list)
              payment_method:
                type: string
                description: >-
                  Settlement sign ("payment" - payment / "prepayment" -
                  prepayment)
              barcode:
                type: string
                description: Product barcode
        payments:
          type: array
          description: List of fees applied per check
          items:
            type: object
            properties:
              type:
                type: string
                description: >-
                  Type of payment ("card" - non-cash payment / "cash" - cash
                  payment / "prepaid" - advance payment)
              sum:
                type: number
                description: Payment amount with an accuracy of 2 decimal places
                format: double
        tax:
          type: string
          description: Type of taxation system (slug from the list of taxation systems)
        cashier:
          type: object
          properties:
            uid:
              type: string
              description: Cashier ID
            name:
              type: string
              description: Cashier's name
            position:
              type: string
              description: Cashier position (maximum line length - 64 characters)
          description: The Essence of a Cashier
        pos:
          type: object
          properties:
            enabled:
              type: boolean
              description: >-
                Is it necessary to accept a card through a POS-terminal before
                fiscalization?
            slip_count:
              type: integer
              description: >-
                Number of receipts to be printed after a successful POS
                transaction
              format: int32
          description: Options for the connected POS terminal
        callback_url:
          type: string
          description: Link to update fiscal status
        custom_text:
          type: string
          description: Arbitrary text for printing on a receipt
      description: Example of a request for fiscalization of a document
      example:
        id: d72fece5-6825-4895-9395-0133195612a4
        date: '2026-09-21T23:00:00.000-05:00'
        document_id: 239083104
        type: sale
        print_receipt: true
        customer:
          email: customer@example.com
          phone: '+13155550175'
        positions:
          - type: service
            title: Consultation
            price: 13.19
            quantity: 1
            discount_amount: 2.54
            vat: ru_vat_10
            payment_method: payment
            barcode: '12345'
        payments:
          - type: card
            sum: 5.55
          - type: cash
            sum: 4.55
          - type: prepaid
            sum: 0.55
        tax: ru_osn
        cashier:
          uid: 4895-9395-0133195612a4
          name: John Smith
          position: Cashier
        pos:
          enabled: true
          slip_count: 2
        callback_url: https://app.alteg.io/api/v1/integration/kkm/callback/
        custom_text: some custom text

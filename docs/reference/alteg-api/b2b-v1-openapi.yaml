      description: >-
        When creating an appointment for a group event, the event_id parameter
        becomes mandatory. In this case, the following parameters become
        optional: 


        + staff_id 

        + services 

        + datetime 

        + session_length


        Custom fields

        You can pass custom values using custom fields created specifically for
        your location (see the "Custom Fields" section for setup details).

        Once created, these fields can be included in the custom_fields object
        when creating an appointment. Each key in this object must match the
        code of the corresponding custom field. Example:


        * If your location has the following custom fields: my_custom_field with
        type="number" some_another_field with type="list"


        * You can pass their values during appointment creation as follows:
        custom_fields: 


        {
         "my_custom_field": 123, "some_another_field": ["first value", "second value"] 
        }


        *  When this appointment is later retrieved using the GET method, the
        same custom field values will be returned in the response.
      operationId: create_appointment

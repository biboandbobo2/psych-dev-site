  /privacy_policy/{location_id}:
    get:
      tags:
        - Online Booking
      security:
        - BearerPartner: []
      summary: Get location privacy policy for online booking
      description: >
        Retrieves the privacy policy configured for a specific location. This
        endpoint should be called before creating an online booking record to
        check if the location has a custom privacy policy.


        If a location has a custom privacy policy configured, the online booking
        flow must:

        - Display the policy text to the user

        - Show a checkbox for accepting the privacy policy

        - Only proceed with booking creation after the user has checked the
        acceptance checkbox


        If no custom policy is configured for the location, the booking can
        proceed without showing any policy acceptance step.
      operationId: get_location_privacy_policy

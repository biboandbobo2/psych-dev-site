      security:
        - BearerPartner: []
      summary: Get Internationalization Options
      description: |-
        Translation is available in one of the languages:
        - Latvian - 'lv-LV'
        - English - 'en-US'
        - Estonian - 'ee-EE'
        - Lithuanian - 'lt-LT'
        - German - 'de-DE'
        - Ukrainian - 'uk-UK'
      operationId: get_i18n_options
      parameters:
        - name: lang_code
          in: path
          description: >-
            Language code. One of the set 'lv-LV', 'en-US', 'ee-EE', 'lt-LT',
            'de-DE', 'uk-UK'
          required: true
          schema:
            type: string
          example: en-US
        - name: Accept

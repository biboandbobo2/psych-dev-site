          application/json:
            schema:
              $ref: '#/components/schemas/book_record_companyid_request_data_types'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/book_record_companyid_response_data_types'
              example:
                success: true
                data:
                  - id: 1
                    record_id: 2820023
                    record_hash: 567df655304da9b98487769426d4e76e
                  - id: 2
                    record_id: 2820024

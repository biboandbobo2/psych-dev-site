  /book_services/{location_id}:
    get:
      tags:
        - Online Booking
      security:
        - BearerPartner: []
      summary: Get Services Available for Booking
      description: >-
        The object of services available for booking has the following fields:


        | Field | Type | Description |

        | ------------- | ------------- | ------------- |

        | categories | array of objects | Array of service categories (you can't
        book a category) |

        | services | array of objects | Services available for booking by
        category |


        An object from the categories array, has the following fields:


        | Field | Type | Description |

        | ------------- | ------------- | ------------- |

        | id | number | Category ID |

        | title | string | Category name |

        | gender | number | Category belonging to gender (1 - male, 2 - female,
        0 - not specified) |

        | weight | number | Category weight. Categories are sorted by weight,
        heavier ones first |

        | api_id | string | External Category ID |


        An object from the services array, has the following fields:


        | Field | Type | Description |

        | ------------- | ------------- | ------------- |

        | id | number | Service ID |

        | title | string | Service name |

        | category_id | number | Identifier of the category to which the service
        belongs |

        | weight | number | Category weight. Services are sorted by weight,
        heavier ones first |

        | price_min | number | The minimum cost of the service |

        | price_max | number | Maximum cost of the service |

        | discount | number | Service discount |

        | comment | string | Comment on the service |

        | active | number | Is the service active |

        | prepaid | string | Online payment status |

        | gender | number | Gender for which the service is provided |

        | session_length | number | Service duration in seconds (only if filter
        by team member is set) |

        | image | string | Image services |



        If you need to get the services provided by a specific team member, then
        you need to use the filter by team member.

        The following filters are available:

        + staff_id: team member ID. If you need services that only the selected
        team member provides

        + datetime: date (in iso8601 format). Specifies the desired appointment
        date. Use this parameter to retrieve services that can be booked with
        the selected team member on that specific date.

        + service_ids: An array of service IDs. If a team member is already
        selected and the time and service(s) are part of an existing
        appointment, this parameter should be used to select an additional
        service.
      operationId: get_services_available_for_booking
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
          example: 4564
        - name: staff_id
          in: query
          description: |
            team member ID. Filter by team member ID
            Default: 0
          schema:
            type: number
          example: 0
        - name: datetime
          in: query
          description: >
            date (in iso8601 format). Filter by service booking date (for
            example '2005-09-09T18:30')

            Default: ''
          schema:
            type: string
          example: 2026-09-09T18:30
        - name: service_ids[]
          in: query
          description: >
            Service ID.

            Filter by the list of identifiers of already selected (within one
            appointment) services. It makes sense if a filter by team member and
            date is set.
          style: form
          explode: false
          schema:
            type: array
            items:
              type: number
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/book_services_companyid_data_types'
              example:
                success: true
                data:
                  events: []
                  services:
                    - id: 1896208
                      title: hair wash
                      category_id: 1895571
                      price_min: 0
                      price_max: 0
                      discount: 0
                      comment: ''
                      weight: 0
                      active: 0
                      gender: 0
                      image: ''
                      prepaid: forbidden
                      seance_length: 3600
                    - id: 1896303
                      title: Coloring
                      category_id: 1895574
                      price_min: 0
                      price_max: 0
                      discount: 0
                      comment: ''
                      weight: 0
                      active: 0
                      gender: 0
                      image: ''
                      prepaid: forbidden
                      seance_length: 3600
                  category:
                    - id: 1895571
                      title: Hair care
                      gender: 0
                      api_id: 0
                      weight: 60
                    - id: 1895574
                      title: Hair coloring
                      gender: 0
                      api_id: 0
                      weight: 7
                meta: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'
  /book_staff/{location_id}:
    get:
      tags:
        - Online Booking
      security:
        - BearerPartner: []
      summary: Get Team Members Available for Booking
      description: >-
        Each object from the array of team members available for booking has the
        following fields:


        | Field | Type | Description |

        | ------------- | ------------- | ------------- |

        | id | number | team member ID |

        | name | string | team member name |

        | specialization | string | team member specialization |

        | position | object | team member position |

        | bookable | boolean | Does the team member have sessions available for
        booking |

        | weight | number | team member weight. When withdrawing, team members
        are sorted by weight, heavier first |

        | show_rating | number | Whether to show team member's rating (1 - show,
        0 - don't show) |

        | rating | number | team member rating |

        | votes_count | number | Number of votes rated team member |

        | comments_count | number | Number of comments to a team member |

        | avatar | string | Path to team member avatar file |

        | information | string | Additional information about the team member
        (HTML format) |

        | session_date | string | Date of the next day that there are available
        sessions (only for bookable = true) |



        The following filters are available:


        + service_ids: Array of service IDs. If you need team members who
        provide only the selected service

        + datetime: date (in iso8601 format). If you need team members who have
        sessions for the specified service at the specified time
      operationId: get_team_members_available_for_booking
      parameters:
        - name: location_id
          in: path
          description: location ID
          required: true
          schema:
            type: number
          example: 4564
        - name: service_ids[]
          in: query
          description: |
            Service ID.
            Filter by the list of service identifiers
          style: form
          explode: false
          schema:
            type: array
            items:
              type: number
        - name: datetime
          in: query
          description: |
            date in iso8601 format.
            Filter by service booking date (for example '2005-09-09T18:30')
          schema:
            type: number
        - name: Accept
          in: header
          description: e.g. application/vnd.api.v2+json
          required: true
          schema:
            type: string
          example: application/vnd.api.v2+json
        - name: Content-Type
          in: header
          description: application/json
          required: true
          schema:
            type: string
        - name: Authorization
          in: header
          description: Bearer partner_token
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/book_staff_companyid_data_types'
              example:
                success: true
                data:
                  - id: 16
                    name: James
                    bookable: true
                    specialization: Paramedic
                    position:
                      id: 1
                      title: Administrator
                    show_rating: 1
                    rating: 3
                    votes_count: 1
                    avatar: https://app.alteg.io/images/no-master.png
                    comments_count: 0
                    weight: 11
                    information: <span></span>
                    seance_date: '2026-09-21'
                    seances: []
                  - id: 32
                    name: Peter
                    bookable: false
                    specialization: Therapist
                    position: []
                    show_rating: 1
                    rating: 4
                    votes_count: 1
                    avatar: https://app.alteg.io/images/no-master.png
                    comments_count: 0
                    weight: 8
                    information: <span></span>
                meta: []
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/401_unauthorized_response'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/403_forbidden_response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/404_not_found_response'

        | booking_days | array of days when there are free sessions | Array of
        days that are available for booking for the specified services |

        | booking_dates | array of dates | An array of dates when there are free
        sessions for the service to the selected team member/organization |


        working days and booking_days have the same format:

        month:[array of days in this month]


        For example, this booking_days:
